<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#191f28"/>
  <!-- 진보(좌) / 보수(우) split — 앱 핵심 메타포 -->
  <rect x="0" y="0" width="256" height="512" fill="#3182f6" opacity="0.08"/>
  <rect x="256" y="0" width="256" height="512" fill="#e5484d" opacity="0.08"/>
  <line x1="256" y1="80" x2="256" y2="432" stroke="#333d4b" stroke-width="1.5"/>
  <!-- 좌 (파란 쪽) -->
  <text
    x="128"
    y="290"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Apple SD Gothic Neo, Pretendard, sans-serif"
    font-size="180"
    font-weight="700"
    fill="#3182f6"
  >좌</text>
  <!-- 우 (빨간 쪽) -->
  <text
    x="384"
    y="290"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Apple SD Gothic Neo, Pretendard, sans-serif"
    font-size="180"
    font-weight="700"
    fill="#e5484d"
  >우</text>
  <!-- 지간 -->
  <text
    x="256"
    y="420"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Apple SD Gothic Neo, Pretendard, sans-serif"
    font-size="64"
    font-weight="600"
    fill="#8b95a1"
    letter-spacing="4"
  >지간</text>
</svg>
